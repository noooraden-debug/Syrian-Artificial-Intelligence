<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة الذكاء الاصطناعي في سوريا</title>
    <!-- تضمين Tailwind CSS مباشرة -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050816; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- شاشة الدخول -->
    <div id="login-screen" class="w-full max-w-md bg-gray-900 p-8 rounded-3xl border border-gray-700 shadow-2xl">
        <h1 class="text-2xl font-bold text-center mb-6 text-emerald-400">دردشة الذكاء الاصطناعي في سوريا 🇸🇾</h1>
        <input id="username" type="text" placeholder="اسم المستخدم" class="w-full p-4 mb-4 bg-gray-800 rounded-2xl border border-gray-700 text-white outline-none focus:border-emerald-500">
        <input id="password" type="password" placeholder="كلمة المرور" class="w-full p-4 mb-6 bg-gray-800 rounded-2xl border border-gray-700 text-white outline-none focus:border-emerald-500">
        <button onclick="login()" class="w-full p-4 bg-emerald-500 rounded-2xl font-black text-slate-900 text-lg hover:bg-emerald-400 transition">دخول الآن</button>
    </div>

    <!-- شاشة الدردشة -->
    <div id="chat-screen" class="hidden w-full max-w-2xl bg-gray-900 p-6 rounded-3xl border border-gray-700 shadow-2xl">
        <h2 class="text-xl font-bold mb-4 text-center">المساعد الذكي</h2>
        <div id="chat-box" class="h-96 overflow-y-auto mb-6 p-4 bg-black/30 rounded-2xl border border-gray-800 space-y-4"></div>
        <div class="flex gap-2">
            <input id="user-input" type="text" placeholder="اكتب سؤالك هنا..." class="flex-1 p-4 bg-gray-800 rounded-2xl border border-gray-700 text-white outline-none">
            <button onclick="sendMessage()" class="px-6 bg-emerald-600 rounded-2xl font-bold">إرسال</button>
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if ((user === 'joker' || user === 'الجوكر') && pass === 'admin123') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
            } else {
                alert('اسم المستخدم أو كلمة المرور غير صحيحة');
            }
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const msg = input.value;
            if (!msg) return;

            chatBox.innerHTML += `<div class="p-3 bg-white text-slate-900 rounded-2xl self-end">أنت: ${msg}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            chatBox.innerHTML += `<div class="p-3 bg-emerald-600/20 text-emerald-100 rounded-2xl">يفكر...</div>`;
            
            setTimeout(() => {
                chatBox.lastElementChild.remove();
                chatBox.innerHTML += `<div class="p-3 bg-emerald-600/30 text-emerald-100 rounded-2xl border border-emerald-500/30">AI: إجابة ذكية حول "${msg}"، كيف يمكنني مساعدتك أكثر؟</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
